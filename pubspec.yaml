name: maat_kiosk
description: MAAT Gym Kiosk — touch-first check-in experience for gym members.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1

  # State management
  provider: ^6.1.2

  # UI / Fonts / Animations
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  animations: ^2.0.11

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/maat-logo.png"
  min_sdk_android: 21
  # Adaptive icon (Android 8+): logo on MAAT's signature dark background.
  adaptive_icon_background: "#151515"
  adaptive_icon_foreground: "assets/maat-logo.png"
  # iOS App Store requires no alpha channel.
  remove_alpha_ios: true
  # Web (disabled — kiosk is mobile-only)
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/maat-logo.png

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Variable.ttf
