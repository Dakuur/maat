name: maat_kiosk
description: MAAT Gym Kiosk — touch-first check-in experience for gym members.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  cloud_firestore: ^5.2.1

  # State management
  provider: ^6.1.2

  # UI / Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Variable.ttf
